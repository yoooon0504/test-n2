<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>행운의 로또 번호 추천</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href='style.css' rel='stylesheet'>
</head>
<body>
  <div class="app-container">
    <header>
      <div class="header-top">
        <button id="theme-toggle" class="theme-btn">
          <i class="fas fa-moon"></i>
        </button>
      </div>
      <h1><i class="fas fa-clover"></i> 행운의 로또 번호</h1>
      <p>오늘의 운세를 믿어보세요!</p>
    </header>

    <main>
      <div class="display-section">
        <div id="lotto-numbers" class="numbers-wrapper">
          <div class="placeholder-text">행운을 불러오는 중...</div>
        </div>
        <button id="generate-btn" class="main-btn">
          <span class="btn-icon"><i class="fas fa-sync-alt"></i></span>
          <span class="btn-text">번호 생성하기</span>
        </button>
      </div>

      <div class="history-section">
        <h3><i class="fas fa-history"></i> 최근 생성 번호</h3>
        <ul id="history-list">
          <li class="empty-msg">아직 생성된 번호가 없습니다.</li>
        </ul>
      </div>

      <div class="contact-section">
        <h3><i class="fas fa-handshake"></i> 제휴 문의</h3>
        <form action="https://formspree.io/f/mpqywlqr" method="POST" class="contact-form">
          <div class="form-group">
            <input type="text" name="name" placeholder="성함 또는 업체명" required>
          </div>
          <div class="form-group">
            <input type="email" name="email" placeholder="이메일 주소" required>
          </div>
          <div class="form-group">
            <textarea name="message" placeholder="문의 내용을 입력해주세요" rows="4" required></textarea>
          </div>
          <button type="submit" class="submit-btn">문의하기</button>
        </form>
      </div>

      <div class="comments-section">
        <h3><i class="fas fa-comments"></i> 댓글</h3>
        <div id="disqus_thread"></div>
        <script>
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://test-n2.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
      </div>
    </main>

    <footer>
      <p>&copy; 2026 Lucky Lotto. Good Luck!</p>
    </footer>
  </div>
  <script defer type="text/javascript" src="main.js"></script>
</body>
</html>
